<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美租激励查询系统</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f7fa;color:#333;min-height:100vh}
        .container{max-width:700px;margin:0 auto;padding:16px}
        h1{text-align:center;color:#1a73e8;margin:20px 0 8px;font-size:1.4em}
        .subtitle{text-align:center;color:#888;font-size:.85em;margin-bottom:20px}
        .tabs{display:flex;gap:0;margin-bottom:16px;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
        .tab{flex:1;padding:14px;text-align:center;font-weight:700;cursor:pointer;background:#fff;color:#888;transition:all .2s;border:none;font-size:1em}
        .tab.active-broker{background:#2e7d32;color:#fff}
        .tab.active-manager{background:#1565c0;color:#fff}
        .search-box{display:flex;gap:8px;margin-bottom:16px}
        .search-box input{flex:1;padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:1em;outline:none;transition:border-color .2s}
        .search-box input:focus{border-color:#1a73e8}
        .search-box button{padding:12px 20px;background:#1a73e8;color:#fff;border:none;border-radius:10px;font-size:1em;cursor:pointer;font-weight:600}
        .search-box button:hover{background:#1557b0}
        .stats{background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);font-size:.9em;color:#666;display:flex;gap:16px;flex-wrap:wrap}
        .stats span{color:#1a73e8;font-weight:700}
        .result-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
        .result-card .field{display:flex;justify-content:space-between;padding:4px 0;font-size:.9em}
        .result-card .field .label{color:#888}
        .result-card .field .value{font-weight:600;color:#333}
        .result-card .field .value.highlight{color:#1a73e8}
        .empty{text-align:center;padding:40px;color:#bbb;font-size:1.1em}
        .period-tag{display:inline-block;background:#e8f0fe;color:#1a73e8;padding:2px 8px;border-radius:6px;font-size:.8em;font-weight:600}
        .amount{color:#2e7d32;font-weight:700}
    </style>
</head>
<body>
<div class="container">
    <h1>美租激励查询系统</h1>
    <p class="subtitle">贝壳惠居·美租事业部</p>
    <div class="tabs">
        <button class="tab active-broker" id="tabBroker" onclick="switchTab('broker')">经纪人激励</button>
        <button class="tab" id="tabManager" onclick="switchTab('manager')">资管业绩</button>
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="输入经纪人姓名/工号/房源编码搜索" onkeydown="if(event.key==='Enter')doSearch()">
        <button onclick="doSearch()">查询</button>
    </div>
    <div class="stats" id="stats"></div>
    <div id="results"></div>
</div>
<script src="data.js"></script>
<script>
let currentTab='broker';
function switchTab(tab){
    currentTab=tab;
    document.getElementById('tabBroker').className=tab==='broker'?'tab active-broker':'tab';
    document.getElementById('tabManager').className=tab==='manager'?'tab active-manager':'tab';
    document.getElementById('searchInput').value='';
    document.getElementById('results').innerHTML='';
    document.getElementById('stats').innerHTML='';
    document.getElementById('searchInput').placeholder=tab==='broker'?'输入经纪人姓名/工号/房源编码搜索':'输入资管姓名/工号/房源编码搜索';
}
function doSearch(){
    const q=document.getElementById('searchInput').value.trim();
    if(!q){document.getElementById('results').innerHTML='<div class="empty">请输入搜索关键词</div>';return}
    const data=currentTab==='broker'?DB_DATA.broker:DB_DATA.manager;
    const fields=currentTab==='broker'?['property_code','broker_id','broker_name']:['property_code','manager_id','manager_name'];
    const matched=data.filter(r=>fields.some(f=>String(r[f]||'').includes(q)));
    if(currentTab==='broker'){
        const totalCash=matched.reduce((s,r)=>s+r.cash,0);
        document.getElementById('stats').innerHTML='找到 <span>'+matched.length+'</span> 条 · 合计 <span>'+totalCash.toLocaleString()+'</span> 元';
    }else{
        const totalAmount=matched.reduce((s,r)=>s+r.contract_amount,0);
        const totalPerf=matched.reduce((s,r)=>s+r.performance,0);
        document.getElementById('stats').innerHTML='找到 <span>'+matched.length+'</span> 条 · 合同 <span>'+totalAmount.toLocaleString()+'</span> 元 · 业绩 <span>'+totalPerf.toLocaleString()+'</span> 元';
    }
    if(!matched.length){document.getElementById('results').innerHTML='<div class="empty">未找到匹配记录</div>';return}
    let html='';
    matched.forEach(r=>{
        if(currentTab==='broker'){
            html+='<div class="result-card">'
                +'<div class="field"><span class="label">房源编码</span><span class="value">'+r.property_code+'</span></div>'
                +'<div class="field"><span class="label">装修产品</span><span class="value">'+(r.product_name||'')+'</span></div>'
                +'<div class="field"><span class="label">经纪人</span><span class="value highlight">'+r.broker_name+'（'+r.broker_id+'）</span></div>'
                +'<div class="field"><span class="label">获得激励</span><span class="value amount">'+r.cash+'元</span></div>'
                +'<div class="field"><span class="label">定金支付</span><span class="value">'+(r.pay_time||'').substring(0,10)+'</span></div>'
                +'<div class="field"><span class="label">发放月份</span><span class="value"><span class="period-tag">'+r.period+'</span></span></div>'
                +'</div>';
        }else{
            html+='<div class="result-card">'
                +'<div class="field"><span class="label">房源编码</span><span class="value">'+r.property_code+'</span></div>'
                +'<div class="field"><span class="label">资管经理</span><span class="value highlight">'+r.manager_name+'（'+r.manager_id+'）</span></div>'
                +'<div class="field"><span class="label">合同金额</span><span class="value">'+(r.contract_amount||0).toLocaleString()+'元</span></div>'
                +'<div class="field"><span class="label">美租业绩</span><span class="value amount">'+(r.performance||0).toLocaleString()+'元</span></div>'
                +'<div class="field"><span class="label">定金支付</span><span class="value">'+(r.pay_time||'').substring(0,10)+'</span></div>'
                +'<div class="field"><span class="label">发放月份</span><span class="value"><span class="period-tag">'+r.period+'</span></span></div>'
                +(r.remark?'<div class="field"><span class="label">备注</span><span class="value">'+r.remark+'</span></div>':'')
                +'</div>';
        }
    });
    document.getElementById('results').innerHTML=html;
}
</script>
</body>
</html>
